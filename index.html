<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manuka - Raporti Ditor</title>
    <style>
        :root {
            --wolt-blue: #009DE0;
            --bg: #F5F7F8;
            --card: #FFFFFF;
            --text: #202125;
            --sub-text: #70777E;
            --border: #EBEEF0;
            --white: #FFFFFF;
            --whatsapp-green: #25D366;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0A0B0C;
                --card: #18191A;
                --text: #F5F7F8;
                --sub-text: #8A8D91;
                --border: #2A2B2C;
            }
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app { width: 100%; max-width: 420px; padding-bottom: 160px; }

        /* HEADER EKRANI */
        .header { 
            background-color: var(--wolt-blue);
            padding: 15px 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom-left-radius: 20px; 
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 12px rgba(0, 157, 224, 0.15);
            margin-left: 15px;
            margin-right: 15px;
            margin-top: 10px;
        }
        
        .logo-container img { height: 95px; width: auto; filter: brightness(0) invert(1); display: block; }
        .logo-fallback { font-size: 40px; font-weight: 900; color: var(--white); letter-spacing: -2px; }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 12px 18px;
            margin: 0 15px 10px 15px;
            border: 1px solid var(--border);
        }

        .label { font-size: 10px; font-weight: 800; color: var(--sub-text); text-transform: uppercase; letter-spacing: 0.8px; }
        .pazari-label { font-size: 11px; font-weight: 800; color: var(--sub-text); text-transform: uppercase; }
        .date-span { color: var(--wolt-blue); margin-left: 5px; }

        input {
            width: 100%;
            padding: 6px 0;
            border: none;
            border-bottom: 1.5px solid var(--border);
            border-radius: 0;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
            color: var(--text);
            outline: none;
        }

        .furnitore-scroll { max-height: 125px; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        .exp-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .exp-row input[class="f-name"] { flex: 3; font-size: 14px; }
        .exp-row input[class="f-val"] { flex: 2; font-size: 14px; text-align: right; font-weight: 600; }
        .remove-btn { background: none; border: none; color: #bdc3c7; font-size: 16px; cursor: pointer; padding: 5px; }
        .add-btn { background: none; border: none; color: var(--wolt-blue); font-weight: 700; cursor: pointer; padding: 10px 0 0 0; font-size: 12px; border-top: 1px solid var(--border); width: 100%; text-align: left; }

        .cash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .cash-item { display: flex; align-items: center; gap: 8px; background: var(--bg); padding: 8px; border-radius: 8px; }
        .cash-label { font-size: 12px; font-weight: 700; color: var(--sub-text); min-width: 35px; }
        .cash-input { border-bottom: none; font-size: 14px; padding: 0; text-align: center; }

        .cash-total-preview {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 700;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-share { padding: 12px; border-radius: 12px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-whatsapp { background-color: var(--whatsapp-green); color: white; }
        .btn-print { background-color: var(--wolt-blue); color: white; }

        .reset-container { text-align: center; margin-top: 25px; }
        .btn-reset { 
            background: none; border: 1.5px solid var(--wolt-blue); color: var(--wolt-blue); 
            padding: 8px 18px; border-radius: 20px; font-size: 10px; 
            font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        .wolt-action-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: var(--wolt-blue);
            color: var(--white);
            padding: 18px 25px;
            padding-bottom: calc(18px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .res-label { font-size: 10px; font-weight: 700; opacity: 0.9; text-transform: uppercase; }
        .res-val { font-size: 19px; font-weight: 800; }
        .status-badge { font-size: 11px; font-weight: 800; padding: 8px 16px; border-radius: 20px; text-transform: uppercase; }
        .badge-neutral { background: rgba(255,255,255,0.2); color: var(--white); }
        .badge-plus { background: #FFFFFF; color: var(--wolt-blue); }
        .badge-minus { background: #FFD6DC; color: #EB193E; }

        /* HEADER-I I PRINTIMIT (VERSIONI PERFEKT) */
        #print-header { display: none; }

        @media print {
            @page { margin: 0; size: portrait; }
            body { background: white; margin: 0; padding: 0; display: block; }
            .app { width: 100%; max-width: 100%; padding: 0; }
            
            #print-header { 
                display: flex !important; 
                width: 100vw; 
                background-color: #009DE0 !important;
                height: 60px;
                justify-content: center;
                align-items: center;
                margin-bottom: 20px;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            #print-header img { height: 45px; filter: brightness(0) invert(1); }
            
            .header, .wolt-action-bar, .add-btn, .remove-btn, .action-btns, .label:not(.print-label), .reset-container { display: none !important; }
            
            .card { border: none; box-shadow: none; margin: 0 40px 15px 40px; padding: 0; width: auto; }
            input { border-bottom: 1px solid #eee !important; font-size: 14px; color: black; }
            
            .pazari-label-print { font-size: 16px; font-weight: 800; text-transform: uppercase; text-align: center; display: block; }
            .date-print { font-size: 12px; color: #009DE0; text-align: center; display: block; margin-bottom: 10px; }
            
            .furnitore-scroll { max-height: none; overflow: visible; border-top: 1px solid #eee; }
            .exp-row { border-bottom: 1px solid #f5f5f5; padding: 5px 0; }
            
            .cash-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 5px !important; border-top: 1px solid #eee; padding-top: 10px; }
            .cash-item { background: none; border: none; padding: 2px; }
            .cash-label { font-size: 10px; font-weight: 700; color: #777; }
        }
    </style>
</head>
<body>

    <div id="print-header">
        <img src="logo.svg" alt="Manuka Logo" onerror="this.style.display='none'; document.getElementById('pf').style.display='block';">
        <div id="pf" style="display:none; color:white; font-weight:900;">MANUKA</div>
    </div>

<div class="app">
    <div class="header">
        <div class="logo-container">
            <img src="logo.svg" alt="Manuka" onerror="this.style.display='none'; document.getElementById('fallback').style.display='block';">
            <div id="fallback" class="logo-fallback" style="display:none;">MANUKA</div>
        </div>
    </div>

    <div class="card">
        <div style="text-align: center;">
            <span class="pazari-label-print">Pazari Ditore</span>
            <span class="date-print date-span" id="date-now">---</span>
        </div>
        <input type="text" id="pazari" placeholder="0,00" oninput="run()" inputmode="decimal" style="text-align: center; font-size: 24px; margin-top: 10px;">
    </div>

    <div class="card">
        <div class="label">Furnitorët / Shpenzimet</div>
        <div class="furnitore-scroll" id="exp-container">
            <div id="exp-list"></div>
        </div>
        <button class="add-btn" onclick="addExp()">+ SHTO SHPENZIM TJETËR</button>
    </div>

    <div class="card">
        <div class="label">Gjendja në Kuletë (Numërimi)</div>
        <div class="cash-grid">
            <div class="cash-item"><span class="cash-label">200€</span><input type="text" class="coin" data-val="200" placeholder="0" oninput="run()" inputmode="numeric"></div>
            <div class="cash-item"><span class="cash-label">100€</span><input type="text" class="coin" data-val="100" placeholder="0" oninput="run()" inputmode="numeric"></div>
            <div class="cash-item"><span class="cash-label">50€</span><input type="text" class="coin" data-val="50" placeholder="0" oninput="run()" inputmode="numeric"></div>
            <div class="cash-item"><span class="cash-label">20€</span><input type="text" class="coin" data-val="20" placeholder="0" oninput="run()" inputmode="numeric"></div>
            <div class="cash-item"><span class="cash-label">10€</span><input type="text" class="coin" data-val="10" placeholder="0" oninput="run()" inputmode="numeric"></div>
            <div class="cash-item"><span class="cash-label">5€</span><input type="text" class="coin" data-val="5" placeholder="0" oninput="run()" inputmode="numeric"></div>
            <div class="cash-item"><span class="cash-label">Hek</span><input type="text" class="coin" data-val="1" placeholder="0,00" oninput="run()" inputmode="decimal"></div>
        </div>
        <div class="cash-total-preview">
            <span>Totali i numëruar:</span>
            <span id="cash-total-label">0.00 €</span>
        </div>

        <div class="action-btns">
            <button class="btn-share btn-whatsapp" onclick="sendWhatsApp()">WhatsApp</button>
            <button class="btn-share btn-print" onclick="window.print()">Print / Share</button>
        </div>
    </div>

    <div class="reset-container">
        <button class="btn-reset" onclick="resetApp()">Reset / Dita e re</button>
    </div>
</div>

<div class="wolt-action-bar">
    <div>
        <div class="res-label">Ne kulet duhet paret mu kan</div>
        <div id="neto" class="res-val">0.00 €</div>
    </div>
    <div id="pill" class="status-badge badge-neutral">Plus / Minus je</div>
</div>

<script>
    function parseNumber(value) {
        if (!value) return 0;
        let sanitized = value.toString().replace(',', '.');
        return parseFloat(sanitized) || 0;
    }

    function updateDate() {
        const d = new Date();
        const opt = { weekday: 'long', day: 'numeric', month: 'short' };
        const formatted = d.toLocaleDateString('sq-AL', opt).toUpperCase();
        document.querySelectorAll('.date-span, .date-print').forEach(el => el.innerText = formatted);
    }
    updateDate();

    function saveAll() {
        const data = {
            pazari: document.getElementById('pazari').value,
            furnitoret: [],
            kuleta: []
        };
        document.querySelectorAll('.exp-row').forEach(r => {
            data.furnitoret.push({ n: r.querySelector('.f-name').value, v: r.querySelector('.f-val').value });
        });
        document.querySelectorAll('.coin').forEach(c => {
            data.kuleta.push(c.value);
        });
        localStorage.setItem('manuka_arka', JSON.stringify(data));
    }

    function loadAll() {
        const saved = localStorage.getItem('manuka_arka');
        if (!saved) { addExp(); return; }
        const data = JSON.parse(saved);
        document.getElementById('pazari').value = data.pazari || "";
        data.furnitoret.forEach(f => addExp(f.n, f.v));
        document.querySelectorAll('.coin').forEach((c, i) => {
            c.value = data.kuleta[i] || "";
        });
        run();
    }

    function addExp(n = "", v = "") {
        const div = document.createElement('div');
        div.className = 'exp-row';
        div.innerHTML = `<input type="text" placeholder="Emri" class="f-name" value="${n}" oninput="run()"><input type="text" placeholder="0,00" class="f-val" value="${v}" oninput="run()" inputmode="decimal"><button class="remove-btn" onclick="removeRow(this)">✕</button>`;
        document.getElementById('exp-list').appendChild(div);
        document.getElementById('exp-container').scrollTop = 999;
    }

    function removeRow(btn) {
        if (document.querySelectorAll('.exp-row').length > 1) { btn.parentElement.remove(); run(); }
        else { btn.parentElement.querySelectorAll('input').forEach(i => i.value = ''); run(); }
        saveAll();
    }

    function resetApp() {
        if (confirm("A jeni të sigurt që dëshironi të filloni një ditë të re?")) {
            localStorage.removeItem('manuka_arka');
            location.reload();
        }
    }

    function run() {
        const pazar = parseNumber(document.getElementById('pazari').value);
        let shp = 0; document.querySelectorAll('.f-val').forEach(i => shp += parseNumber(i.value));
        let cash = 0; document.querySelectorAll('.coin').forEach(i => cash += parseNumber(i.value) * parseFloat(i.dataset.val));
        const neto = pazar - shp;
        const dif = cash - neto;
        document.getElementById('cash-total-label').innerText = cash.toFixed(2) + " €";
        document.getElementById('neto').innerText = neto.toFixed(2) + " €";
        const pill = document.getElementById('pill');
        if (pazar === 0 && cash === 0) { pill.innerText = "Plus / Minus je"; pill.className = "status-badge badge-neutral"; }
        else if (Math.abs(dif) < 0.01) { pill.innerText = "OK"; pill.className = "status-badge badge-plus"; }
        else { pill.innerText = (dif > 0 ? "+" : "") + dif.toFixed(2) + " €"; pill.className = "status-badge " + (dif > 0 ? "badge-plus" : "badge-minus"); }
        saveAll();
    }

    function sendWhatsApp() {
        const pazar = document.getElementById('pazari').value || "0";
        const neto = document.getElementById('neto').innerText;
        const total = document.getElementById('cash-total-label').innerText;
        const stat = document.getElementById('pill').innerText;
        const data = document.getElementById('date-now').innerText;
        let shp = ""; document.querySelectorAll('.exp-row').forEach(r => {
            const n = r.querySelector('.f-name').value;
            const v = r.querySelector('.f-val').value;
            if(n || v) shp += `%0A- ${n || 'Shpenzim'}: ${v || '0'}€`;
        });
        const msg = `*RAPORTI DITOR - MANUKA*%0A---%0A📅 *Data:* ${data}%0A💰 *Pazari:* ${pazar}€${shp}%0A---%0A✅ *Paret ne kulet duhet mu kan:* ${neto}%0A💵 *Numëruar:* ${total}%0A📊 *Statusi:* ${stat}`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    window.onload = loadAll;
</script>

</body>
</html>
