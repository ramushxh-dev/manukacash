<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manuka - Pro Cash Control</title>

    <style>
        :root {
            --bg: #0f1012;
            --card: #1c1e22;
            --accent: #c0a062; 
            --accent-soft: rgba(192, 160, 98, 0.1);
            --text: #ffffff;
            --secondary: #9aa0a6;
            --border: #2f3337;
            --input-bg: #26292e;
            --success: #00e676;
            --danger: #ff5252;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px 15px max(15px, env(safe-area-inset-bottom)) 15px; 
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 400px; }

        .header {
            width: 100%;
            padding: 0;
            margin-bottom: 8px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none; 
            border: none;
            box-shadow: none;
        }

        /* LOGO NË EKRAN (TELEFON) */
        .header img { 
            width: 230px;  
            height: 230px; 
            object-fit: cover; 
            object-position: center 35%; 
            margin-bottom: 0; 
            border-radius: 40px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8); 
            border: none; 
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 12px; 
            margin-bottom: 10px; 
            border: 1px solid var(--border);
        }

        h3 {
            margin: 0 0 10px 0;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3::before { content: ""; width: 3px; height: 12px; background: var(--accent); border-radius: 10px; }

        label { display: block; font-size: 0.65rem; color: var(--secondary); margin-bottom: 4px; font-weight: 600; }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); background: #2d3137; }

        .supplier-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .supplier-row input[type="text"] { flex: 1.5; }
        .supplier-row input[type="number"] { flex: 1; text-align: right; color: var(--success); font-weight: 700; }

        .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }

        .btn-add { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
        .btn-remove { background: rgba(255, 82, 82, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .wallet-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .denom-label { font-size: 0.9rem; font-weight: 700; color: #ccc; }
        .denom-input-wrapper { display: flex; align-items: center; gap: 12px; }
        .denom-input-wrapper input { width: 65px; height: 32px; text-align: center; font-weight: 700; padding: 0; }
        .row-total { min-width: 80px; text-align: right; font-size: 0.85rem; color: var(--secondary); font-family: monospace; }

        .status-box {
            text-align: center;
            padding: 15px; 
            border-radius: 16px;
            background: linear-gradient(145deg, #1e2024, #141518);
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .big-sum { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .status-msg { font-size: 0.7rem; font-weight: bold; margin-top: 4px; letter-spacing: 1px; }

        .main-actions { display: grid; grid-template-columns: 1fr 1.5fr; gap: 12px; margin-top: 15px; margin-bottom: 20px; }
        .btn-main { padding: 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; border: none; cursor: pointer; }
        .btn-reset { background: #2f3337; color: white; }
        .btn-print { background: var(--success); color: #000; }

        /* KËTU ËSHTË RREGULLUAR PJESA E PRINTIMIT */
        @media print {
            .btn-group, .main-actions, .btn-action { display: none !important; }
            .is-empty { display: none !important; }
            body { background: white; padding: 0; color: black; }
            .card, .status-box { border: 1px solid #ccc !important; background: white !important; color: black !important; box-shadow: none !important; break-inside: avoid; }
            
            .header { background: none !important; color: black !important; border: none !important; box-shadow: none !important; margin-bottom: 30px !important; }
            
            /* Logoja zmadhohet në 300px vetëm kur printohet */
            .header img { 
                width: 300px !important; 
                height: 300px !important; 
                box-shadow: none !important; 
                border: none !important; 
            } 
            
            h3, .denom-label { color: black !important; }
            input { border: none !important; color: black !important; background: none !important; }
            input::placeholder { color: transparent !important; }
            .big-sum, #totalCash, #theoretical { color: black !important; }
            .wallet-item { border-bottom: 1px solid #eee !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="MANUKA" onerror="this.style.display='none'">
    </div>

    <div class="card">
        <div style="display:flex; gap:10px;">
            <div style="flex:1.2;">
                <label>📅 Data</label>
                <input type="text" id="data">
            </div>
            <div style="flex:1;">
                <label>💰 Pazari Total</label>
                <input type="number" id="pazari" min="0" oninput="calculate()" onfocus="this.select()" placeholder="0.00" step="0.01">
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Furnitorët</h3>
        <div id="supplierList">
            <div class="supplier-row">
                <input type="text" placeholder="Emri..." onfocus="this.select()" oninput="calculate()">
                <input type="number" class="s-amount" min="0" placeholder="0.00" onfocus="this.select()" oninput="calculate()" step="0.01">
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-action btn-add" onclick="addSupplier()">+ Shto</button>
            <button class="btn-action btn-remove" onclick="removeLastSupplier()">✕ Fshij</button>
        </div>
        <div style="margin-top:15px; padding-top:10px; border-top:1px solid var(--border); display:flex; justify-content:space-between;">
            <span style="font-size:0.7rem; color:var(--secondary);">NETO E PRITUR:</span>
            <span id="theoretical" style="font-weight:800; color:var(--accent);">0.00 €</span>
        </div>
    </div>

    <div class="card">
        <h3>Arka Fizike</h3>
        <div class="wallet-list" id="denomContainer">
            <div class="wallet-item is-empty" id="coinsRow" style="background:var(--accent-soft); margin-top:10px; padding:10px; border-radius:8px; border:none;">
                <div class="denom-label" style="color:var(--accent);">Monedha (Hekra)</div>
                <input type="number" id="hekrat" min="0" oninput="calculate()" onfocus="this.select()" placeholder="0.00" step="0.01" style="width:100px; text-align:right;">
            </div>
        </div>

        <div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:flex; justify-content:space-between;">
            <span style="font-size:0.7rem; color:var(--secondary);">TOTALI NË ARKË:</span>
            <span id="totalCash" style="font-weight:800; color:var(--success); font-size:1.1rem;">0.00 €</span>
        </div>
    </div>

    <div id="statusCard" class="status-box">
        <div id="diffSum" class="big-sum">0.00 €</div>
        <div id="statusMsg" class="status-msg">GATI</div>
    </div>

    <div class="main-actions">
        <button class="btn-main btn-reset" onclick="confirmReset()">RESET</button>
        <button class="btn-main btn-print" onclick="window.print()">PRINTO PDF</button>
    </div>
</div>

<script>
    document.getElementById('data').value = new Date().toLocaleDateString('sq-AL', { weekday: 'short', day: 'numeric', month: 'short' });

    const denomContainer = document.getElementById('denomContainer');
    const coinsRow = document.getElementById('coinsRow');
    const denominations = [200, 100, 50, 20, 10, 5];
    
    denominations.forEach(d => {
        const div = document.createElement('div');
        div.className = 'wallet-item is-empty';
        div.innerHTML = `
            <div class="denom-label">${d}€</div>
            <div class="denom-input-wrapper">
                <input type="number" class="cash" data-v="${d}" min="0" oninput="calculate()" onfocus="this.select()" placeholder="0">
                <span class="row-total">0.00 €</span>
            </div>
        `;
        denomContainer.insertBefore(div, coinsRow);
    });

    function addSupplier(){
        const div = document.createElement('div');
        div.className = 'supplier-row';
        div.innerHTML = '<input type="text" placeholder="Emri..." onfocus="this.select()" oninput="calculate()"><input type="number" class="s-amount" min="0" placeholder="0.00" onfocus="this.select()" oninput="calculate()" step="0.01">';
        document.getElementById('supplierList').appendChild(div);
    }

    function removeLastSupplier(){
        const list = document.getElementById('supplierList');
        if(list.children.length > 1) { list.removeChild(list.lastChild); calculate(); }
    }

    function calculate(){
        const pazari = parseFloat(document.getElementById('pazari').value) || 0;
        let spent = 0;
        
        document.querySelectorAll('.supplier-row').forEach(row => {
            const val = parseFloat(row.querySelector('.s-amount').value) || 0;
            const name = row.querySelector('input[type="text"]').value;
            spent += val;
            if(val === 0 && name === "") row.classList.add('is-empty'); else row.classList.remove('is-empty');
        });

        const theo = pazari - spent;
        document.getElementById('theoretical').innerText = theo.toFixed(2) + " €";

        let paperCash = 0;
        document.querySelectorAll('.wallet-item').forEach(item => {
            const input = item.querySelector('input.cash');
            if(input) {
                const d = parseFloat(input.getAttribute('data-v'));
                const count = parseFloat(input.value) || 0;
                const sub = d * count;
                paperCash += sub;
                item.querySelector('.row-total').innerText = sub.toFixed(2) + " €";
                if(count === 0) item.classList.add('is-empty'); else item.classList.remove('is-empty');
            }
        });

        const coins = parseFloat(document.getElementById('hekrat').value) || 0;
        const totalPhys = paperCash + coins;
        document.getElementById('totalCash').innerText = totalPhys.toFixed(2) + " €";

        const diff = totalPhys - theo;
        const diffEl = document.getElementById('diffSum');
        const msgEl = document.getElementById('statusMsg');

        diffEl.innerText = (diff > 0 ? "+" : "") + diff.toFixed(2) + " €";

        if(pazari === 0 && totalPhys === 0) {
            diffEl.style.color = "white";
            msgEl.innerText = "GATI";
        } else if(Math.abs(diff) < 0.01) {
            diffEl.style.color = "var(--success)";
            msgEl.innerText = "OK ✅";
        } else if(diff < 0) {
            diffEl.style.color = "var(--danger)";
            msgEl.innerText = "MUNGESË ⚠️";
        } else {
            diffEl.style.color = "var(--accent)";
            msgEl.innerText = "TEPRICË 💹";
        }
    }

    function confirmReset(){
        if(confirm("Dëshironi të fshini të gjitha të dhënat?")) location.reload();
    }
</script>

</body>
</html>
