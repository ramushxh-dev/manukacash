<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Manuka">
    
    <title>Manuka - Luxury Cash Manager</title>

    <style>
        :root {
            --bg: #0d0f0d;           
            --card: #141614;         
            --accent: #b39356;       
            --text: #e0e0e0;         
            --secondary: #5d665d;    
            --border: #222622;       
            --input-bg: #090a09;     
            --success: #2e7d32;      
            --danger: #962a22;       
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg);
            background-image: url('splash.png');
            background-size: cover;
            background-position: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 15px calc(env(safe-area-inset-bottom) + 20px) 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 400px; }

        .header-box {
            width: 100%; height: 100px; margin: 15px 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px;
        }

        .logo-main { width: 100%; height: 80%; object-fit: contain; }

        .card {
            background: var(--card); border-radius: 14px;
            padding: 12px; margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        h3 {
            margin: 0 0 10px 0; font-size: .7rem;
            color: var(--accent); text-transform: uppercase;
            letter-spacing: 1px; display: flex; align-items: center; gap: 6px;
        }

        label { display: block; font-size: .6rem; color: var(--secondary); margin-bottom: 3px; text-transform: uppercase; }

        input {
            width: 100%; background: var(--input-bg);
            border: 1px solid var(--border); color: var(--text);
            padding: 8px; border-radius: 10px; font-size: 16px;
            box-sizing: border-box; outline: none;
        }

        .supplier-row { display: flex; gap: 6px; margin-bottom: 6px; }
        .supplier-row input[type="text"]:first-child { flex: 1.5; }
        /* Stilimi për inputet e parave që tani janë text */
        .money-input { flex: 1; text-align: right; color: var(--success); font-weight: bold; }

        .btn-group { display: flex; gap: 8px; margin-top: 5px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 8px; font-size: .65rem; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-add { background: rgba(179, 147, 86, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .btn-remove { background: rgba(150, 42, 34, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .wallet-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
        .denom-label { font-size: .85rem; font-weight: 600; color: #aaa; }
        .row-total { min-width: 70px; text-align: right; font-size: .8rem; color: var(--secondary); }

        .status-box {
            text-align: center; padding: 15px; border-radius: 16px;
            background: #090a09; border: 1px solid var(--border); margin-top: 8px;
        }

        .theo-info { font-size: .7rem; color: var(--secondary); margin-bottom: 5px; }
        .theo-val { color: var(--text); font-weight: bold; font-size: 1.1rem; }
        .big-sum { font-size: 2.2rem; font-weight: 800; margin: 0; }

        .main-actions { display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px; margin-top: 15px; }
        .btn-main { padding: 15px; border-radius: 12px; font-size: .8rem; font-weight: 800; border: none; cursor: pointer; }
        .btn-reset { background: #222; color: #888; }
        .btn-print { background: var(--accent); color: #000; }

        @media print {
            @page { size: A4; margin: 1cm; }
            #splash-screen { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .container { max-width: 100% !important; width: 100% !important; }
            .header-box { height: 70px !important; margin: 0 0 15px 0 !important; background: none !important; border: none !important; }
            .logo-main { filter: brightness(0) !important; max-height: 70px !important; }
            .card { border: none !important; border-bottom: 1px solid #ddd !important; padding: 5px 0 !important; margin-bottom: 5px !important; background: none !important; border-radius: 0 !important; }
            h3 { font-size: 10px !important; color: black !important; border-bottom: 1px solid #000; margin-bottom: 5px !important; }
            label { font-size: 9px !important; color: #444 !important; }
            input { background: none !important; color: black !important; border: none !important; font-weight: bold; font-size: 13px !important; padding: 2px 0 !important; }
            .wallet-item { padding: 2px 0 !important; border-bottom: 1px solid #f0f0f0 !important; }
            .denom-label { font-size: 12px !important; color: black !important; }
            .row-total { font-size: 11px !important; color: black !important; }
            .status-box { background: #f1f1f1 !important; border: 1px solid #ccc !important; padding: 10px !important; margin-top: 15px !important; border-radius: 8px !important; }
            .big-sum { font-size: 24px !important; color: black !important; }
            .theo-val { font-size: 14px !important; color: black !important; }
            .main-actions, .btn-group, .btn-action { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="splash-screen"></div>

    <div class="container">
        <div class="header-box">
            <img src="logo.svg" class="logo-main" alt="Logo">
        </div>

        <div class="card">
            <div style="display:flex;gap:10px;">
                <div style="flex:1.2;">
                    <label>📅 Data</label>
                    <input type="text" id="data">
                </div>
                <div style="flex:1;">
                    <label>💰 Pazari Total</label>
                    <input type="text" id="pazari" class="money-input" oninput="calculate()" placeholder="0.00" inputmode="decimal">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Furnitorët</h3>
            <div id="supplierList">
                <div class="supplier-row">
                    <input type="text" placeholder="Emri...">
                    <input type="text" class="s-amount money-input" placeholder="0.00" oninput="calculate()" inputmode="decimal">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-action btn-add" onclick="addSupplier()">+ Shto</button>
                <button class="btn-action btn-remove" onclick="removeLastSupplier()">✕</button>
            </div>
        </div>

        <div class="card">
            <h3>Arka Fizike</h3>
            <div id="denomContainer"></div>
            <div class="wallet-item" style="border-top:1px solid var(--border);margin-top:5px;padding-top:5px;">
                <div class="denom-label">Hekrat</div>
                <input type="text" id="hekrat" class="money-input" oninput="calculate()" style="width:100px;" inputmode="decimal" placeholder="0.00">
            </div>
        </div>

        <div class="status-box">
            <div class="theo-info">NË KULET DUHET TË JENË: <span id="theoretical" class="theo-val">0.00 €</span></div>
            <div style="font-size:.65rem; font-weight:800; color:var(--secondary); letter-spacing: 1px; text-transform: uppercase;">PLUS / MINUS KE DALË</div>
            <div id="diffSum" class="big-sum">0.00 €</div>
        </div>

        <div class="main-actions">
            <button class="btn-main btn-reset" onclick="confirmReset()">RESET</button>
            <button class="btn-main btn-print" onclick="window.print()">PRINTO PDF</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 800);
            }, 2500); 
        });

        document.getElementById('data').value = new Date().toLocaleDateString('sq-AL', {weekday:'short',day:'numeric',month:'short'});

        const denominations=[200,100,50,20,10,5];
        const container=document.getElementById('denomContainer');

        denominations.forEach(d=>{
            const div=document.createElement('div');
            div.className='wallet-item';
            div.innerHTML= `
                <div class="denom-label">${d}€</div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <input type="text" class="cash" data-v="${d}" oninput="calculate()" style="width:55px;text-align:center;" inputmode="numeric">
                    <span class="row-total">0.00 €</span>
                </div>`;
            container.appendChild(div);
        });

        function addSupplier(){
            const div=document.createElement('div');
            div.className='supplier-row';
            div.innerHTML='<input type="text" placeholder="Emri..."><input type="text" class="s-amount money-input" placeholder="0.00" oninput="calculate()" inputmode="decimal">';
            document.getElementById('supplierList').appendChild(div);
        }

        function removeLastSupplier(){
            const list=document.getElementById('supplierList');
            if(list.children.length>1) list.removeChild(list.lastChild);
            calculate();
        }

        // Funksioni për të pastruar tekstin dhe konvertuar në numër
        function parseVal(val) {
            let clean = val.replace(',', '.'); // Kthen presjen në pikë nese përdoret
            return parseFloat(clean) || 0;
        }

        function calculate(){
            const pazari = parseVal(document.getElementById('pazari').value);
            
            let furnitoret = 0;
            document.querySelectorAll('.s-amount').forEach(i => furnitoret += parseVal(i.value));
            
            let arka = 0;
            document.querySelectorAll('.cash').forEach(i => {
                const v = parseFloat(i.getAttribute('data-v'));
                const s = (parseVal(i.value)) * v;
                arka += s;
                i.nextElementSibling.innerText = s.toFixed(2) + " €";
            });
            
            arka += parseVal(document.getElementById('hekrat').value);
            
            const netoPritur = pazari - furnitoret;
            document.getElementById('theoretical').innerText = netoPritur.toFixed(2) + " €";
            
            const diff = arka - netoPritur;
            const diffEl = document.getElementById('diffSum');
            diffEl.innerText = (diff > 0 ? "+" : "") + diff.toFixed(2) + " €";

            if(Math.abs(diff) < 0.01) diffEl.style.color = "var(--accent)";
            else if(diff < 0) diffEl.style.color = "var(--danger)";
            else diffEl.style.color = "#00e676";
        }

        function confirmReset(){
            if(confirm("Dëshironi të fshini të gjitha të dhënat?")) location.reload();
        }
    </script>
</body>
</html>
